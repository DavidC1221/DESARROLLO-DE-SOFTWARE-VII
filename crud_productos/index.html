<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUD - Gestión de Productos</title>

    <!-- Bootstrap 5 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet"
    />
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
        }

        .card-header-custom {
            background: linear-gradient(135deg, #4e73df, #224abe);
            color: #fff;
        }

        .table thead {
            background-color: #4e73df;
            color: #fff;
        }

        .btn-accion {
            min-width: 120px;
        }

        #idProducto {
            display: none; /* Campo oculto para edición */
        }
    </style>
</head>
<body>

<div class="container py-5">

    <!-- ── Encabezado ── -->
    <div class="text-center mb-4">
        <h2 class="fw-bold text-primary">
            <i class="bi bi-box-seam"></i> Gestión de Productos
        </h2>
        <p class="text-muted">CRUD con Fetch API + PHP OOP + MySQL</p>
    </div>

    <!-- ── Formulario ── -->
    <div class="card shadow-sm mb-4">
        <div class="card-header card-header-custom py-3">
            <h5 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Formulario de Productos</h5>
        </div>
        <div class="card-body">

            <!-- Campo oculto para el ID (se usa al editar) -->
            <input type="hidden" id="idProducto" name="id" value="0" />

            <div class="row g-3">
                <!-- Código -->
                <div class="col-md-3">
                    <label for="Codigo" class="form-label fw-semibold">Código</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-upc-scan"></i></span>
                        <input
                            type="text"
                            class="form-control"
                            id="Codigo"
                            name="codigo"
                            placeholder="Ej: PROD-001"
                            maxlength="20"
                        />
                    </div>
                </div>

                <!-- Nombre del Producto -->
                <div class="col-md-4">
                    <label for="Producto" class="form-label fw-semibold">Producto</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-tag"></i></span>
                        <input
                            type="text"
                            class="form-control"
                            id="Producto"
                            name="producto"
                            placeholder="Nombre del producto"
                            maxlength="100"
                        />
                    </div>
                </div>

                <!-- Precio -->
                <div class="col-md-2">
                    <label for="Precio" class="form-label fw-semibold">Precio ($)</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-currency-dollar"></i></span>
                        <input
                            type="number"
                            class="form-control"
                            id="Precio"
                            name="precio"
                            step="0.01"
                            min="0.01"
                            placeholder="0.00"
                        />
                    </div>
                </div>

                <!-- Cantidad -->
                <div class="col-md-2">
                    <label for="Cantidad" class="form-label fw-semibold">Cantidad</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-123"></i></span>
                        <input
                            type="number"
                            class="form-control"
                            id="Cantidad"
                            name="cantidad"
                            step="1"
                            min="1"
                            placeholder="0"
                        />
                    </div>
                </div>
            </div>

            <!-- Botones de acción -->
            <div class="d-flex gap-2 flex-wrap mt-4">
                <!-- Botón Registrar / Actualizar (cambia dinámicamente) -->
                <button
                    id="btnGuardar"
                    class="btn btn-primary btn-accion"
                    onclick="manejarAccion()"
                >
                    <i class="bi bi-save me-1"></i> Registrar
                </button>

                <!-- Botón Buscar por código -->
                <button
                    class="btn btn-info text-white btn-accion"
                    onclick="buscarProducto()"
                >
                    <i class="bi bi-search me-1"></i> Buscar
                </button>

                <!-- Limpiar formulario -->
                <button
                    class="btn btn-secondary btn-accion"
                    onclick="limpiarFormulario()"
                >
                    <i class="bi bi-x-circle me-1"></i> Limpiar
                </button>
            </div>

        </div><!-- /card-body -->
    </div><!-- /card -->

    <!-- ── Tabla de productos ── -->
    <div class="card shadow-sm">
        <div class="card-header card-header-custom py-3 d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="bi bi-table me-2"></i>Lista de Productos</h5>
            <button class="btn btn-light btn-sm" onclick="ListarProductos()">
                <i class="bi bi-arrow-clockwise me-1"></i> Recargar
            </button>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0 text-center align-middle">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Código</th>
                            <th>Producto</th>
                            <th>Precio</th>
                            <th>Cantidad</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaProductos">
                        <tr>
                            <td colspan="6" class="text-muted py-4">
                                <i class="bi bi-hourglass-split"></i> Cargando productos...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div><!-- /container -->

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Script principal -->
<script src="script.js"></script>

<!-- Cargar lista al iniciar la página -->
<script>
    document.addEventListener("DOMContentLoaded", () => ListarProductos());
</script>

</body>
</html>
